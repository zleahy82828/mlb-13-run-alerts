name: MLB 13 Run Alerts

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  inputs:
    run_mode:
      description: "Choose live, test, or mock_live"
      required: true
      default: "test"
      type: choice
      options:
        - test
        - live
        - mock_live

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set run mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "RUN_MODE=live" >> $GITHUB_ENV
          else
            echo "RUN_MODE=${{ github.event.inputs.run_mode }}" >> $GITHUB_ENV
          fi

      - name: Run script
        env:
          RUN_MODE: ${{ env.RUN_MODE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ASSIGNMENTS_CSV_URL: ${{ secrets.ASSIGNMENTS_CSV_URL }}
          CONFIG_CSV_URL: ${{ secrets.CONFIG_CSV_URL }}
        run: python mlb_13_run_alerts.py
